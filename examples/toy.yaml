  pubKey: Q2K4ftnrexPPBti1PYAQBFYaw4VPcoY7HqLpWd9GXzd

fhir bundle (co-signing Provenance):
  sigKind: fhirProvenance
  alg: RS256
  signNode: http://hl7.org/fhir/Bundle/signed
  signGraph: &fhirBundleGraph |
    PREFIX fhir: <http://hl7.org/fhir/>
    PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
    PREFIX rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#>
    <http://hl7.org/fhir/Bundle/signed> a fhir:Bundle ;
        fhir:nodeRole fhir:treeRoot ;
        fhir:id [ fhir:v "signed" ] ;
        fhir:identifier [
            fhir:system [ fhir:v "http://something1"^^xsd:anyURI ; fhir:l <http://something1> ] ;
            fhir:value [ fhir:v "something2" ]
        ] ;
        fhir:type [ fhir:v "collection" ] ;
        fhir:timestamp [ fhir:v "2024-06-09T11:06:35+10:00"^^xsd:dateTime ] ;
        fhir:link ( [
            fhir:relation [ fhir:v "self" ] ;
            fhir:url [ fhir:v "http://something3"^^xsd:anyURI ; fhir:l <http://something3> ]
        ] ) ;
        fhir:entry ( [
            fhir:fullUrl [ fhir:v "http://something5"^^xsd:anyURI ; fhir:l <http://something5> ] ;
            fhir:resource ( <http://something5> )
        ] ) .
    <http://something5> a fhir:Observation ;
        fhir:id [ fhir:v "obs1" ] ;
        fhir:text [
            fhir:status [ fhir:v "generated" ] ;
            fhir:div [ fhir:v "<div xmlns=\"http://www.w3.org/1999/xhtml\"><a name=\"Observation_obs1\"> </a>This is a simple <b>example</b></div>"^^rdf:XMLLiteral ]
        ] ;
        fhir:status [ fhir:v "final" ] ;
        fhir:code [ fhir:text [ fhir:v "something" ] ] ;
        fhir:value [ a fhir:Quantity ; fhir:value [ fhir:v "1"^^xsd:decimal ] ] .
  proofNode: http://something4
  withProof: |
    PREFIX fhir: <http://hl7.org/fhir/>
    PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
    # Provenance co-signs the Bundle. Its attribution metadata (agent, recorded, reason)
    # is NOT covered by the signature — only signGraph above is signed.
    # The rule: strip all Provenance entries whose fhir:target references this Bundle before hashing.
    <http://something4> a fhir:Provenance ;
        fhir:id [ fhir:v "prov1" ] ;
        fhir:target [ fhir:reference [ fhir:v "Bundle/signed" ] ] ;
        fhir:recorded [ fhir:v "2024-06-09T11:06:35+10:00"^^xsd:dateTime ] ;
        fhir:agent [
            fhir:type [
                fhir:coding ( [
                    fhir:system [ fhir:v "http://terminology.hl7.org/CodeSystem/v3-ParticipationType"^^xsd:anyURI ] ;
                    fhir:code [ fhir:v "AUT" ]
                ] )
            ] ;
            fhir:who [ fhir:reference [ fhir:v "Organization/ig-publisher" ] ]
        ] ;
        fhir:signature [
            fhir:type [
                fhir:coding ( [
                    fhir:system [ fhir:v "urn:iso-astm:E1762-95:2013"^^xsd:anyURI ] ;
                    fhir:code [ fhir:v "1.2.840.10065.1.12.1.1" ]
                ] )
            ] ;
            fhir:when [ fhir:v "2024-06-09T11:06:35+10:00"^^xsd:dateTime ] ;
            fhir:who [ fhir:reference [ fhir:v "Organization/ig-publisher" ] ] ;
            fhir:targetFormat [ fhir:v "application/fhir+json;canonicalization=http://hl7.org/fhir/canonicalization/json"^^xsd:anyURI ] ;
            fhir:sigFormat [ fhir:v "application/jose" ]
        ] .
  keyId: http://example.org/certificates/ig-publisher-key1
  privKey: 
  pubKey: 

fhir bundle (directly-signed Bundle):
  sigKind: fhirBundle
  alg: RS256
  signNode: http://hl7.org/fhir/Bundle/signed
  signGraph: *fhirBundleGraph
  proofNode: http://hl7.org/fhir/Bundle/signed
  withProof: |
    PREFIX fhir: <http://hl7.org/fhir/>
    PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
    # fhir:signature is attached directly to the Bundle (deprecated in FHIR R5).
    # Only signGraph above is signed; the signature metadata below is not.
    <http://hl7.org/fhir/Bundle/signed> fhir:signature [
        fhir:type [
            fhir:coding ( [
                fhir:system [ fhir:v "urn:iso-astm:E1762-95:2013"^^xsd:anyURI ] ;
                fhir:code [ fhir:v "1.2.840.10065.1.12.1.1" ]
            ] )
        ] ;
        fhir:when [ fhir:v "2024-06-09T11:06:35+10:00"^^xsd:dateTime ] ;
        fhir:who [ fhir:reference [ fhir:v "Organization/ig-publisher" ] ] ;
        fhir:targetFormat [ fhir:v "application/fhir+json;canonicalization=http://hl7.org/fhir/canonicalization/json"^^xsd:anyURI ] ;
        fhir:sigFormat [ fhir:v "application/jose" ]
    ] .
  keyId: http://example.org/certificates/ig-publisher-key1
  privKey: 
  pubKey: 
